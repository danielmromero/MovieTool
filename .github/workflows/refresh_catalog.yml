name: Refresh catalog snapshot

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force a refresh even if the snapshot is still fresh
        required: false
        default: 'false'
  schedule:
    - cron: '17 5 * * *'
  push:
    branches: [ main, master ]
    paths:
      - 'server.py'
      - 'requirements.txt'
      - '.python-version'
      - '.github/workflows/refresh_catalog.yml'

permissions:
  contents: write

concurrency:
  group: refresh-catalog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Refresh catalog snapshot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            python server.py --refresh-snapshot
          else
            python server.py --refresh-snapshot-if-stale
          fi
      - name: Commit snapshot if it changed
        run: |
          if git diff --quiet -- catalog_snapshot.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog_snapshot.json
          git commit -m "Refresh catalog snapshot"

          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
